<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tandem</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Georgia, 'Songti SC', 'Noto Serif SC', serif;
    background: #D6D2CE; color: #2A2A2A;
    height: 100vh; overflow: hidden;
  }
  input::placeholder { color: #BBB; font-style: italic; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #C0BCB8; border-radius: 2px; }

  /* Screens */
  .screen { display: none; height: 100vh; }
  .screen.active { display: flex; }

  /* Lobby */
  #lobby {
    flex-direction: column; align-items: center; justify-content: center;
  }
  #lobby h1 { font-size: 1.6rem; color: #3A3A3A; margin-bottom: 6px; }
  #lobby p { color: #AAA; font-size: 0.82rem; margin-bottom: 24px; line-height: 1.6; }
  .lobby-box {
    background: rgba(255,255,255,0.25); border: 1px solid rgba(0,0,0,0.06);
    border-radius: 14px; padding: 28px 32px; max-width: 400px; width: 90%;
    text-align: center; margin-bottom: 16px;
  }
  .lobby-input {
    padding: 10px 16px; border-radius: 8px; border: 1.5px solid #C0BCB8;
    background: rgba(255,255,255,0.5); font-family: monospace; font-size: 1.2rem;
    text-align: center; letter-spacing: 0.3em; width: 160px; outline: none;
    text-transform: uppercase; color: #3A3A3A; font-weight: 700;
  }
  .lobby-input:focus { border-color: #999; }
  .btn {
    padding: 9px 26px; border-radius: 8px; border: none; cursor: pointer;
    background: #3A3A3A; color: #E0DCD8; font-family: inherit;
    font-weight: 600; font-size: 0.82rem; transition: background 0.2s;
  }
  .btn:hover { background: #555; }
  .btn-ghost {
    padding: 5px 16px; border-radius: 6px; border: 1px solid #C0BCB8;
    background: transparent; color: #999; font-family: inherit;
    font-weight: 500; font-size: 0.72rem; cursor: pointer; transition: all 0.2s;
  }
  .btn-ghost:hover { background: #3A3A3A; color: #F0EDEA; border-color: #3A3A3A; }
  .room-code-display {
    font-family: monospace; font-size: 2rem; font-weight: 700;
    letter-spacing: 0.3em; color: #3A3A3A; margin: 12px 0;
  }
  .status { font-size: 0.75rem; color: #AAA; margin-top: 8px; }
  .or-divider { color: #CCC; font-size: 0.75rem; margin: 16px 0; }

  /* Game layout */
  #game { flex-direction: row; }
  .sidebar {
    width: 90px; flex-shrink: 0; background: #CCCAC6;
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 0;
  }
  .avatar {
    width: 50px; height: 50px; border-radius: 50%; margin-bottom: 10px;
  }
  .avatar-1 { background: radial-gradient(circle at 38% 32%, #F2B0B0, #E08888); }
  .avatar-2 { background: radial-gradient(circle at 38% 32%, #EDED9E, #D8D86E); }
  .sidebar-label { font-size: 0.7rem; color: #777; }
  .sidebar-score {
    margin-top: auto; text-align: center; padding-bottom: 8px;
  }
  .sidebar-score .num { font-size: 1.3rem; font-weight: 700; color: #666; }
  .sidebar-score .lbl { font-size: 0.55rem; color: #AAA; letter-spacing: 0.06em; }
  .you-badge {
    font-size: 0.55rem; background: rgba(0,0,0,0.06); color: #888;
    padding: 1px 6px; border-radius: 8px; margin-top: 4px;
  }

  .center {
    flex: 1; background: #F0EDEA; display: flex; flex-direction: column;
    overflow-y: auto;
  }
  .toolbar {
    padding: 16px 32px 12px; border-bottom: 1px solid rgba(0,0,0,0.05);
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .toolbar .room-info {
    font-size: 0.63rem; color: #BBB; font-family: monospace;
  }
  .upload-box {
    padding: 7px 14px; border-radius: 8px; border: 1.5px dashed #C0BCB8;
    background: rgba(255,255,255,0.3); cursor: pointer;
    font-size: 0.7rem; color: #999; text-align: center;
  }
  .upload-box .ok { color: #5A9E6F; font-weight: 600; }

  .sentences-area {
    flex: 1; padding: 12px 32px 32px; overflow-y: auto;
  }
  .sentence-pair {
    margin-bottom: 28px; transition: opacity 0.5s;
  }
  .sentence-pair.past { opacity: 0.38; pointer-events: none; }
  .sentence-pair.future { opacity: 0.3; pointer-events: none; }
  .sentence-num {
    font-size: 0.88rem; font-weight: 700; margin-bottom: 4px;
  }
  .sentence-pair.active .sentence-num { color: #555; }
  .sentence-pair:not(.active) .sentence-num { color: #C0BCB8; }
  .sentence-line {
    font-size: 1.05rem; line-height: 2; margin-bottom: 2px;
  }
  .blank-input {
    padding: 0; font-size: inherit; font-family: inherit;
    font-weight: inherit; color: inherit; border: none;
    background: transparent; outline: none; text-align: left;
    line-height: inherit;
  }
  .blank-input.u1 { border-bottom: 2px solid #D4A0A0; }
  .blank-input.u2 { border-bottom: 2px solid #C8C870; }
  .locked-val {
    font-weight: 600; padding: 0 2px;
  }
  .locked-val.u1 { border-bottom: 2px solid #D4A0A0; }
  .locked-val.u2 { border-bottom: 2px solid #C8C870; }
  .locked-val.correct { color: #5A9E6F; }
  .locked-val.wrong { color: #C0392B; }
  .correct-hint { color: #5A9E6F; margin-left: 8px; font-size: 0.88em; font-weight: 500; }
  .action-row { margin-top: 8px; }

  .waiting-msg {
    text-align: center; padding: 40px; color: #BBB; font-size: 0.85rem;
  }

  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .fade-in { animation: fadeIn 0.3s ease; }
</style>
</head>
<body>

<!-- LOBBY SCREEN -->
<div id="lobby" class="screen active">
  <h1>Tandem</h1>
  <p>Cooperative language exchange for two players.</p>

  <div class="lobby-box">
    <div style="margin-bottom:16px; font-size:0.8rem; color:#777; font-weight:600;">Create a new room</div>
    <button class="btn" onclick="createRoom()">Create Room</button>
    <div id="created-info" style="display:none; margin-top:14px;">
      <div style="font-size:0.7rem; color:#AAA;">Share this code with your partner:</div>
      <div class="room-code-display" id="room-code-show"></div>
      <div class="status" id="create-status">Waiting for partner...</div>
    </div>
  </div>

  <div class="or-divider">— or —</div>

  <div class="lobby-box">
    <div style="margin-bottom:12px; font-size:0.8rem; color:#777; font-weight:600;">Join a room</div>
    <input class="lobby-input" id="join-input" placeholder="CODE" maxlength="4"
      onkeydown="if(event.key==='Enter')joinRoom()">
    <div style="margin-top:12px;">
      <button class="btn" onclick="joinRoom()">Join</button>
    </div>
    <div class="status" id="join-status"></div>
  </div>
</div>

<!-- GAME SCREEN -->
<div id="game" class="screen">
  <!-- User 1 sidebar -->
  <div class="sidebar">
    <div class="avatar avatar-1"></div>
    <div class="sidebar-label">User 1</div>
    <div id="u1-you" class="you-badge" style="display:none;">you</div>
    <div class="sidebar-score">
      <div class="num" id="u1-score">0</div>
      <div class="lbl">correct</div>
    </div>
  </div>

  <!-- Center -->
  <div class="center">
    <div class="toolbar">
      <div class="upload-box" id="upload-box" onclick="document.getElementById('file-input').click()">
        <span id="file-label">Upload document</span>
      </div>
      <input type="file" id="file-input" accept=".txt,.tsv,.csv" style="display:none" onchange="handleUpload(this)">
      <button class="btn-ghost" onclick="useDefaults()">Demo</button>
      <button class="btn-ghost" onclick="doRestart()">Restart</button>
      <span class="room-info" id="progress-info"></span>
      <span class="room-info" id="room-info-bar"></span>
    </div>

    <div id="waiting-area" class="waiting-msg">
      Upload a document or click Demo to start.
    </div>

    <div class="sentences-area" id="sentences-area" style="display:none;"></div>
  </div>

  <!-- User 2 sidebar -->
  <div class="sidebar">
    <div class="avatar avatar-2"></div>
    <div class="sidebar-label">User 2</div>
    <div id="u2-you" class="you-badge" style="display:none;">you</div>
    <div class="sidebar-score">
      <div class="num" id="u2-score">0</div>
      <div class="lbl">correct</div>
    </div>
  </div>
</div>

<script>
const socket = io();
let myPlayer = 0; // 1 or 2
let roomCode = "";
let sentences = [];
let activeIdx = 0;
let u1Val = {}, u2Val = {}, u1Locked = {}, u2Locked = {}, revealed = {};

// --- LOBBY ---
function createRoom() {
  socket.emit("create-room", (res) => {
    if (res.error) return alert(res.error);
    myPlayer = res.player;
    roomCode = res.code;
    document.getElementById("created-info").style.display = "block";
    document.getElementById("room-code-show").textContent = res.code;
  });
}

function joinRoom() {
  const code = document.getElementById("join-input").value.trim().toUpperCase();
  if (!code) return;
  socket.emit("join-room", code, (res) => {
    if (res.error) {
      document.getElementById("join-status").textContent = res.error;
      return;
    }
    myPlayer = res.player;
    roomCode = res.code;
    showGame();
  });
}

socket.on("player-joined", ({ count }) => {
  if (count === 2) {
    document.getElementById("create-status").textContent = "Partner joined!";
    setTimeout(showGame, 500);
  }
});

socket.on("player-left", ({ count }) => {
  // Could show a message, but keep playing
});

function showGame() {
  document.getElementById("lobby").classList.remove("active");
  document.getElementById("game").classList.add("active");
  document.getElementById("room-info-bar").textContent = "Room: " + roomCode;
  if (myPlayer === 1) document.getElementById("u1-you").style.display = "block";
  else document.getElementById("u2-you").style.display = "block";
}

// --- FILE UPLOAD ---
function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    const pairs = parseFile(text);
    if (pairs.length > 0) {
      document.getElementById("file-label").innerHTML = '<span class="ok">✓ ' + file.name + '</span>';
      socket.emit("load-sentences", pairs);
    }
  };
  reader.readAsText(file);
}

function parseFile(text) {
  const lines = text.split("\n").map(l => l.trim()).filter(l => l.length > 0);
  const pairs = [];
  if (lines.length > 0 && lines[0].includes("\t")) {
    for (const line of lines) {
      const parts = line.split("\t");
      if (parts.length >= 2) pairs.push({ a: parts[0].trim(), b: parts[1].trim() });
    }
  } else {
    for (let i = 0; i + 1 < lines.length; i += 2) {
      pairs.push({ a: lines[i], b: lines[i + 1] });
    }
  }
  return pairs;
}

function useDefaults() {
  socket.emit("use-defaults");
}

function doRestart() {
  socket.emit("restart");
}

// --- GAME EVENTS ---
socket.on("sentences-loaded", (data) => {
  sentences = data.sentences;
  activeIdx = data.activeIdx;
  u1Val = data.u1Val;
  u2Val = data.u2Val;
  u1Locked = data.u1Locked;
  u2Locked = data.u2Locked;
  revealed = data.revealed;
  document.getElementById("waiting-area").style.display = "none";
  document.getElementById("sentences-area").style.display = "block";
  renderAll();
});

socket.on("player-locked", (data) => {
  u1Locked = data.u1Locked;
  u2Locked = data.u2Locked;
  u1Val = data.u1Val;
  u2Val = data.u2Val;
  renderAll();
});

socket.on("revealed", (data) => {
  revealed = data.revealed;
  renderAll();
});

socket.on("advance", (data) => {
  activeIdx = data.activeIdx;
  renderAll();
  // Focus input
  setTimeout(() => {
    const el = document.getElementById("input-" + (myPlayer === 1 ? "a" : "b") + "-" + activeIdx);
    if (el) el.focus();
  }, 200);
});

// --- RENDER ---
function renderAll() {
  const area = document.getElementById("sentences-area");
  area.innerHTML = "";
  document.getElementById("progress-info").textContent = (activeIdx + 1) + " / " + sentences.length;
  updateScores();

  sentences.forEach((s, i) => {
    const isActive = i === activeIdx;
    const isPast = i < activeIdx;
    const isFuture = i > activeIdx;

    const div = document.createElement("div");
    div.className = "sentence-pair " + (isActive ? "active" : isPast ? "past" : "future");
    if (isActive) div.id = "active-row";

    // Number
    const num = document.createElement("div");
    num.className = "sentence-num";
    num.textContent = (i + 1) + ".";
    div.appendChild(num);

    // Line A (User 1 fills)
    div.appendChild(renderLine(s.a, i, "a", 1));
    // Line B (User 2 fills)
    div.appendChild(renderLine(s.b, i, "b", 2));

    // Action buttons (only on active)
    if (isActive) {
      const aLocked = !!u1Locked[i] || !s.a.hasBracket;
      const bLocked = !!u2Locked[i] || !s.b.hasBracket;
      const bothLocked = aLocked && bLocked;
      const isRevealed = !!revealed[i];
      const isLast = i === sentences.length - 1;

      if (bothLocked && !isRevealed) {
        const row = document.createElement("div");
        row.className = "action-row fade-in";
        const btn = document.createElement("button");
        btn.className = "btn-ghost";
        btn.textContent = "Reveal";
        btn.onclick = () => socket.emit("reveal", { idx: i });
        row.appendChild(btn);
        div.appendChild(row);
      }

      if (isRevealed && !isLast) {
        const row = document.createElement("div");
        row.className = "action-row fade-in";
        const btn = document.createElement("button");
        btn.className = "btn-ghost";
        btn.textContent = "Next →";
        btn.onclick = () => socket.emit("next");
        row.appendChild(btn);
        div.appendChild(row);
      }

      if (isRevealed && isLast) {
        const row = document.createElement("div");
        row.className = "action-row fade-in";
        row.innerHTML = '<div style="color:#AAA;font-size:0.78rem;margin-bottom:8px">Session complete</div>';
        const btn = document.createElement("button");
        btn.className = "btn-ghost";
        btn.textContent = "Again";
        btn.onclick = () => socket.emit("restart");
        row.appendChild(btn);
        div.appendChild(row);
      }
    }

    area.appendChild(div);
  });

  // Scroll active into view
  const activeRow = document.getElementById("active-row");
  if (activeRow) activeRow.scrollIntoView({ behavior: "smooth", block: "center" });
}

function renderLine(lineData, idx, lang, who) {
  const div = document.createElement("div");
  div.className = "sentence-line";

  if (!lineData.hasBracket) {
    div.textContent = lineData.before;
    return div;
  }

  const isActive = idx === activeIdx;
  const vals = who === 1 ? u1Val : u2Val;
  const locks = who === 1 ? u1Locked : u2Locked;
  const locked = !!locks[idx];
  const isRevealed = !!revealed[idx];
  const isMyLine = who === myPlayer;
  const value = vals[idx] || "";

  div.appendChild(document.createTextNode(lineData.before));

  if (locked) {
    // Show locked value
    const span = document.createElement("span");
    span.className = "locked-val u" + who;
    if (isRevealed) {
      const isMatch = value.trim().toLowerCase() === lineData.answer.toLowerCase();
      span.classList.add(isMatch ? "correct" : "wrong");
    }
    span.textContent = value || "—";
    div.appendChild(span);

    if (isRevealed && value.trim().toLowerCase() !== lineData.answer.toLowerCase()) {
      const hint = document.createElement("span");
      hint.className = "correct-hint";
      hint.textContent = "(" + lineData.answer + ")";
      div.appendChild(hint);
    }
  } else if (isActive && isMyLine) {
    // Editable input
    const input = document.createElement("input");
    input.type = "text";
    input.className = "blank-input u" + who;
    input.id = "input-" + lang + "-" + idx;
    input.value = value;
    input.style.width = Math.max(50, lineData.answer.length * 15 + 14) + "px";
    input.autocomplete = "off";
    input.spellcheck = false;
    input.oninput = () => {
      if (who === 1) u1Val[idx] = input.value;
      else u2Val[idx] = input.value;
      socket.emit("typing", { idx, value: input.value });
    };
    input.onkeydown = (e) => {
      if (e.key === "Enter" && input.value.trim()) {
        socket.emit("lock", { idx, value: input.value.trim() });
      }
    };
    div.appendChild(input);
  } else if (isActive && !isMyLine) {
    // Other player's blank — show waiting underline
    const span = document.createElement("span");
    span.style.display = "inline-block";
    span.style.width = Math.max(50, lineData.answer.length * 15 + 14) + "px";
    span.style.borderBottom = who === 1 ? "2px solid #D4A0A0" : "2px solid #C8C870";
    span.style.height = "1.2em";
    span.innerHTML = "&nbsp;";
    div.appendChild(span);
  } else {
    // Future — just show blank
    div.appendChild(document.createTextNode("______"));
  }

  div.appendChild(document.createTextNode(lineData.after));
  return div;
}

function updateScores() {
  let s1 = 0, s2 = 0;
  for (const k in revealed) {
    if (!revealed[k] || !sentences[k]) continue;
    if (sentences[k].a.hasBracket && (u1Val[k] || "").trim().toLowerCase() === sentences[k].a.answer.toLowerCase()) s1++;
    if (sentences[k].b.hasBracket && (u2Val[k] || "").trim().toLowerCase() === sentences[k].b.answer.toLowerCase()) s2++;
  }
  document.getElementById("u1-score").textContent = s1;
  document.getElementById("u2-score").textContent = s2;
}

// Auto-focus on load
socket.on("sentences-loaded", () => {
  setTimeout(() => {
    const el = document.getElementById("input-" + (myPlayer === 1 ? "a" : "b") + "-0");
    if (el) el.focus();
  }, 300);
});
</script>
</body>
</html>
